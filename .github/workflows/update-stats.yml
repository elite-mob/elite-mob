name: Update README stats

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "profile/**"
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: profile-readme-stats
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create profile directory
        run: mkdir -p profile

      # Stats + top languages use hosted readme-stats-github.pages.dev in README (reliable).
      # Trophy + snake are generated here. Add GH_TOKEN (PAT) for better API limits.

      - name: Generate trophy
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: ${{ github.repository_owner }}
          file: profile/trophy.svg
          theme: radical
          no-background: "true"
          no-frame: "true"
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            profile/snake.svg

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/
          git diff --staged --quiet && echo "No changes" || (git commit -m "chore: update README stats" && git push)
